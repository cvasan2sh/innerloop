<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>InnerLoop</title>
<script>
  // Simple geo redirect based on timezone
  // US timezones: UTC-5 to UTC-10 (offset 300-600 mins)
  const offset = new Date().getTimezoneOffset();
  if (offset >= 300 && offset <= 600) {
    window.location.href = '/us/';
  } else {
    window.location.href = '/in/';
  }
</script>
<noscript>
  <meta http-equiv="refresh" content="0;url=/in/">
</noscript>
</head>
<body></body>
</html>
